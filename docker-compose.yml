version: "3.9"

services:
  freeproxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freeproxy-server
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/swagger.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
